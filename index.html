<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álvaro Reyes</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                 "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;

    color:white;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    text-align:center;
    overflow-x:hidden;

    background: linear-gradient(
        120deg,
        #ff7adf 0%,
        #ff9ff3 35%,
        #6bcfff 65%,
        #4facfe 100%
    );
    background-size:140% 140%;
    animation: gradientSmooth 18s ease-in-out infinite alternate;
}

@keyframes gradientSmooth{
    0%{ background-position:40% 50%; }
    100%{ background-position:60% 50%; }
}

.wrapper{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
}

header h1{
    margin-top:70px;
    margin-bottom:80px;
    font-size:3.2rem;
    font-weight:700;
    letter-spacing:-0.5px;
    text-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.foto-perfil{
    margin-bottom:110px;
}

.foto-perfil img{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:28px;
    box-shadow:0 15px 30px rgba(0,0,0,0.25);
    transition:transform .4s ease;
}

.foto-perfil img:hover{
    transform:scale(1.04);
}

.links{
    display:flex;
    gap:60px;
    justify-content:center;
    flex-wrap:wrap;
    max-width:760px;
    margin-bottom:110px;
}

.card{
    display:flex;
    flex-direction:column;
    align-items:center;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(25px);
    padding:35px;
    border-radius:30px;
    text-decoration:none;
    color:rgba(255,255,255,0.98);
    width:190px;
    transition:all .35s ease;
    border:1px solid rgba(255,255,255,0.35);
}

.card h3{
    font-size:1.42rem;
    font-weight:700;
    letter-spacing:0.3px;
    white-space: nowrap;
}

.card img{
    width:75px;
    height:75px;
    margin-top:18px;
    object-fit:contain;
    filter:brightness(1.2);
    border-radius:18px;
    transition:transform .3s ease, filter .3s ease;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.card:hover img{
    transform:scale(1.08);
    filter:brightness(1.35);
}

footer{
    padding:25px;
    font-size:.95rem;
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(20px);
}
</style>
</head>

<body>

<div class="wrapper">

<header>
    <h1>Álvaro Reyes</h1>
</header>

<section class="foto-perfil">
    <img src="foto_blanco.png" alt="Foto de perfil">
</section>

<main>
    <section class="links">



        <a href="https://www.instagram.com/23reyees_" class="card" target="_blank">
            <h3>Instagram</h3>
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram">
        </a>

        <a href="https://www.tiktok.com/@23.reyees" class="card" target="_blank">
            <h3>TikTok</h3>
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" alt="TikTok">
        </a>

        <a href="https://wa.me/633260077" class="card" target="_blank">
            <h3>WhatsApp</h3>
            <img src="whatsapp.png" alt="WhatsApp">
        </a>

        <a href="https://link.brawlstars.com/invite/friend/es?tag=90GUYRL8J&token=844pbb23" class="card" target="_blank">
            <h3>Brawl Stars</h3>
            <img src="/brawl.png" alt="Brawl Stars">
        </a>

        <a href="https://link.clashroyale.com/invite/friend/es?tag=9VCYPUC82&token=67k66ya6&platform=iOS&m=0" class="card" target="_blank">
            <h3>Clash Royale</h3>
            <img src="/clash.png" alt="Clash Royale">
        </a>

    </section>
</main>

</div>

<footer>
Copyright © 2025 Álvaro Reyes Website. All rights reserved.
</footer>

</body>
</html>
